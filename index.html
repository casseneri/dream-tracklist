<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Tracklist Maker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="editor">

        <h1>Dream Tracklist Maker</h1>

        <p>If you could create the ultimate greatest hits album of original Christina Grimmie songs, which ones would make the cut? Build your own Legacy Collection and share it with @TheRealGrimmie online!</p>
        <p>Can you narrow it down to just 12 songs?</p>

        <label>Your Name</label>

        <input
            id="name"
            maxlength="20"
            placeholder=" ">

        <div id="tracks"></div>

        <button id="download">
            DOWNLOAD IMAGE
        </button>
<button id="reset">
    RESET
</button>
    </div>

    <div class="preview">

        <canvas
            id="canvas"
            width="1080"
            height="1350">
        </canvas>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
